[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
watchPatterns = ["implementation/scale-group-hq/**"]

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[service]
internalPort = 3000
rootDirectory = "implementation/scale-group-hq"
