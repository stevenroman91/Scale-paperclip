[build]
builder = "nixpacks"
buildCommand = "corepack enable && pnpm install --frozen-lockfile && pnpm -r build"

[deploy]
startCommand = "mkdir -p /root/.paperclip/instances/default && echo '{\"instanceId\":\"default\"}' > /root/.paperclip/instances/default/config.json && cd /app && node cli/node_modules/tsx/dist/cli.mjs cli/src/index.ts auth bootstrap-ceo 2>&1 || true; cd /app/server && HOST=0.0.0.0 node --import ./node_modules/tsx/dist/loader.mjs dist/index.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
